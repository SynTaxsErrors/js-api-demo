name: JavaScript CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}

      - name: Setup Node.js env
        uses: actions/setup-node@v6.4.0
      - name: build project
        run: 
          npm ci
          npm run build --if-present
      - name: Test Project
        run: npm test
